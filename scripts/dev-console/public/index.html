<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Risezome dev console</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>Risezome dev console</h1>
      <form id="config" class="config">
        <label>tag <input id="tag" name="tag" placeholder="nathan" autocomplete="off" /></label>
        <label
          >supabase
          <select id="mode" name="mode">
            <option value="hosted">hosted</option>
            <option value="local">local</option>
          </select>
        </label>
        <button type="submit">Apply</button>
        <span id="config-status" class="muted"></span>
      </form>
      <label
        class="reset-toggle"
        title="When on, a cold Supabase start wipes + re-seeds the DB. Off keeps your local data."
      >
        <input type="checkbox" id="reset-on-start" />
        reset DB on start
      </label>
      <div class="all-controls">
        <button data-all="start">Start all</button>
        <button data-all="stop">Stop all</button>
        <button id="clear-logs">Clear logs</button>
      </div>
    </header>

    <div id="activity" class="activity" hidden>
      <span class="spinner"></span>
      <span id="activity-text"></span>
    </div>

    <div class="top-row">
      <section class="proc links-panel" id="links-panel">
        <div class="proc-head">
          <span class="proc-name">Links</span>
          <span class="muted console-sub">URLs for running tools</span>
        </div>
        <div class="links" id="links"><span class="muted">nothing running yet</span></div>
      </section>

      <section class="proc sidecar-panel" id="sidecar-panel">
        <div class="proc-head">
          <span class="proc-name">Sidecar</span>
          <span class="badge missing" id="sidecar-badge">missing</span>
        </div>
        <div class="sidecar-body">
          <div class="sidecar-meta">
            <span>audio capture</span>
            <span class="muted" id="sidecar-os"></span>
            <span class="muted sidecar-path" id="sidecar-path"></span>
          </div>
          <button id="sidecar-build" title="Build the audio sidecar for this OS">Build</button>
        </div>
      </section>
      <section class="proc localmeeting-panel" id="localmeeting-panel">
        <div class="proc-head">
          <span class="proc-name">Local meeting</span>
          <span class="badge idle" id="lm-badge">idle</span>
        </div>
        <div class="sidecar-body">
          <div class="sidecar-meta">
            <span>capture a real meeting from your mic — no Recall bot</span>
            <a class="muted" id="lm-live" href="#" target="_blank" rel="noreferrer" hidden></a>
          </div>
          <div>
            <button id="lm-start" title="Mint a meeting + start capturing from the local sidecar">Start</button>
            <button id="lm-stop" title="Stop capture + complete the meeting (recap + gaps)" disabled>Stop</button>
          </div>
        </div>
      </section>
    </div>

    <main id="procs" class="procs">
      <section class="proc console-panel" id="console-panel">
        <div class="proc-head">
          <span class="proc-name">Console</span>
          <span class="muted console-sub">orchestration steps &amp; tunnel setup</span>
        </div>
        <pre class="logs" id="console-logs"></pre>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
