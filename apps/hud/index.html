<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Upwell</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <main id="app">
      <header id="hud-header">
        <span id="meeting-status" class="status status-idle" aria-live="polite">IDLE</span>
        <span id="meeting-label"></span>
        <span id="connection-banner" class="hidden" role="status"></span>
        <button
          id="theme-toggle"
          type="button"
          class="ml-auto inline-flex items-center justify-center w-8 h-8 rounded-md border border-[var(--border)] bg-transparent text-[var(--muted)] hover:text-[var(--accent)] hover:border-[var(--accent)] transition-colors"
          aria-label="Toggle light/dark theme"
          title="Toggle light/dark theme"
        >
          <span class="theme-toggle-icon" aria-hidden="true">◐</span>
        </button>
      </header>
      <section id="pinned-section" aria-label="Pinned cards"></section>
      <!-- Pulsing badge that appears when new cards arrive while the user
           is hovering the stream (likely reading). Click or mouse-leave
           dismisses it and scrolls to the new content. -->
      <button
        id="new-content-badge"
        type="button"
        class="hidden sticky top-2 self-center z-10 px-3 py-1 rounded-full bg-[var(--accent)] text-white text-xs font-semibold shadow-md animate-pulse cursor-pointer"
        aria-live="polite"
      >
        <span id="new-content-count">0</span> new ↑
      </button>
      <section id="card-stream" aria-label="Card stream" aria-live="polite"></section>
      <!--
        Separate SR-only live region for synthesis. The streaming synthesis
        card is aria-live="off" so we don't spam announcements per-token;
        this region receives the finalized text once on synthesisDone so
        screen readers announce the whole answer exactly once.
      -->
      <div id="synthesis-announce" aria-live="polite" class="sr-only"></div>
    </main>
    <script type="module" src="/assets/main.js"></script>
  </body>
</html>
