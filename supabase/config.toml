# Supabase local-dev configuration. `supabase start` reads this to spin up
# Postgres + Auth + Realtime + Storage in Docker. Link to a remote project
# via `supabase link --project-ref <ref>`.

project_id = "upwell-portal"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[realtime]
enabled = true

[storage]
enabled = false

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://upwell.com"]
jwt_expiry = 3600
enable_signup = true
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

[auth.external.google]
enabled = true
client_id = "env(GOOGLE_OAUTH_CLIENT_ID)"
secret = "env(GOOGLE_OAUTH_CLIENT_SECRET)"
# Skip nonce check is fine when behind the Supabase proxy; tighten for prod
# if the security review (post-MVP) calls for it.
skip_nonce_check = false
